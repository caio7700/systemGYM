<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Registrar Pagamento - SystemGym</title>
</head>
<body class="bg-light">
    <main class="container mt-5">
        <div class="card shadow mx-auto" style="max-width: 600px;">
            <div class="card-header bg-dark text-white">
                <h4 class="mb-0">Registrar Pagamento</h4>
            </div>
            <div class="card-body">
                <h5 class="text-muted mb-4">Aluno: <span class="text-dark" th:text="${nomeAluno}"></span></h5>
                
                <form th:action="@{/admin/pagamento/salvar}" th:object="${pagamento}" method="post">
                    <input type="hidden" th:field="*{aluno.id}">
                    
                    <div class="mb-3">
                        <label class="form-label">Valor do Pagamento (R$)</label>
                        <input type="number" step="0.01" th:field="*{valorPago}" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Data do Pagamento</label>
                        <input type="date" th:field="*{dataPagamento}" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Forma de Pagamento</label>
                        <select th:field="*{formaPagamento}" class="form-select" required>
                            <option value="Dinheiro">Dinheiro</option>
                            <option value="Cartão de Crédito">Cartão de Crédito</option>
                            <option value="Cartão de Débito">Cartão de Débito</option>
                            <option value="PIX">PIX</option>
                        </select>
                    </div>

                    <div class="alert alert-info py-2">
                        <small>O vencimento será calculado automaticamente com base no plano do aluno.</small>
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary">Confirmar Recebimento</button>
                        <a th:href="@{/admin/aluno/lista}" class="btn btn-outline-secondary">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </main>
</body>
</html>
