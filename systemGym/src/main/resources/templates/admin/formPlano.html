<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-Zenh87qX5JnK2Jl0vWa8Ck2rdkQ2Bzep5IDxbcnCeuOxjzrPF/et3URy9Bv1WTRi" crossorigin="anonymous">
    <title>Cadastro de Plano - SystemGym</title>
</head>

<body class="d-flex flex-column min-vh-100 bg-light">
    <main class="flex-grow-1 container mt-5">
        <div class="card shadow p-4">
            <h2 class="text-center mb-4" th:text="${plano.id == null} ? 'Novo Plano de Academia' : 'Editar Plano'"></h2>

            <form th:action="@{/admin/plano/salvar}" th:object="${plano}" method="post">
                <input type="hidden" th:field="*{id}">

                <div class="mb-3">
                    <label class="form-label">Nome do Plano (Ex: Mensal Gold)</label>
                    <input type="text" th:field="*{nome}" class="form-control" required>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Duração (Meses)</label>
                        <input type="number" th:field="*{duracaoMeses}" class="form-control" placeholder="Ex: 12"
                            required>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Valor Total (R$)</label>
                        <input type="number" step="0.01" th:field="*{valor}" class="form-control" placeholder="0.00"
                            required>
                    </div>
                </div>

                <div class="d-grid gap-2 mt-4">
                    <button type="submit" class="btn btn-success"
                        th:text="${plano.id == null} ? 'Salvar Plano' : 'Atualizar Plano'"></button>
                    <a th:href="@{/admin/plano/lista}" class="btn btn-outline-secondary">Cancelar</a>
                </div>
            </form>
        </div>
    </main>

    <footer class="card text-bg-dark mt-4 shadow-sm" style="width: 100%; border-radius: 0;">
        <div class="card-header text-center">
            <h4 class="mb-0">SYSTEMGYM</h4>
        </div>
        <div class="card-body text-center">
            <h5 class="card-title">Produced By</h5>
            <p class="card-text">Caio Rocha</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-OERcA2EqjJCMA+/3y+gxIOqMEjwtxJY7qPCqsdltbNJuaOe923+mo//f6V8Qbsw3"
        crossorigin="anonymous"></script>
</body>

</html>
