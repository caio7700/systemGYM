<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Extrato de Pagamentos - SystemGym</title>
</head>
<body class="bg-light">
    <main class="container mt-5">
        <div class="card shadow">
            <div class="card-header bg-success text-white">
                <h3 class="mb-0">Histórico Financeiro (Recebimentos)</h3>
            </div>
            <div class="card-body">
                <table class="table table-striped">
                    <thead>
                        <tr>
                            <th>Data</th>
                            <th>Aluno</th>
                            <th>Valor</th>
                            <th>Forma</th>
                            <th>Vencimento Gerado</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="p : ${pagamentos}">
                            <td th:text="${#temporals.format(p.dataPagamento, 'dd/MM/yyyy')}"></td>
                            <td th:text="${p.aluno.nome}"></td>
                            <td th:text="'R$ ' + ${p.valorPago}"></td>
                            <td th:text="${p.formaPagamento}"></td>
                            <td th:text="${#temporals.format(p.dataVencimento, 'dd/MM/yyyy')}" class="fw-bold text-primary"></td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <div class="card-footer">
                <a th:href="@{/admin/aluno/lista}" class="btn btn-secondary">Voltar</a>
            </div>
        </div>
    </main>
</body>
</html>
